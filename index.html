<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Unendlicher Goldener Radius Zoom</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 8px;
            pointer-events: none;
            max-width: 280px;
            border: 1px solid #333;
        }
        h1 { margin: 0 0 5px 0; font-size: 14px; color: #ffd700; }
        p { margin: 0; font-size: 11px; color: #ccc; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="info">
        <h1>Unendliche Goldene Spirale</h1>
        <p>📱 <b>2 Finger:</b> Zoomen & Skalieren<br>👆 <b>1 Finger / Ziehen:</b> Verschieben<br>🖱️ <b>Mausrad:</b> Zoomen</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const PHI = (1 + Math.sqrt(5)) / 2;

        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        let isDragging = false;
        let startX = 0, startY = 0;

        let touchStartDist = 0;
        let touchStartScale = 1;

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.resetTransform();
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }

        // Schnelle Fibonacci-Berechnung via Binet-Formel zur Performance-Steigerung
        function getFib(n) {
            return Math.round((Math.pow(PHI, n) - Math.pow(-PHI, -n)) / Math.sqrt(5));
        }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            ctx.save();
            ctx.translate(window.innerWidth / 2 + offsetX, window.innerHeight / 2 + offsetY);
            ctx.scale(scale, scale);

            // Dynamisches Berechnungsfenster für den unendlichen Zoom
            let minGen = 1;
            let maxGen = 30;

            if (scale > 1) {
                let shift = Math.floor(Math.log(scale) / Math.log(PHI));
                minGen += shift;
                maxGen += shift;
            }

            let x = 0;
            let y = 0;

            for (let i = 1; i < maxGen; i++) {
                let size = getFib(i);
                let dir = i % 4; // 0: rechts, 1: unten, 2: links, 3: oben

                let qx = x;
                let qy = y;

                if (dir === 0) { qy -= size; x += size; }
                else if (dir === 1) { qx -= size; y += size; }
                else if (dir === 2) { qx -= size; qy -= size; x -= size; }
                else if (dir === 3) { y -= size; }

                if (i >= minGen) {
                    // Quadrate zeichnen
                    ctx.strokeStyle = `rgba(255, 215, 0, ${Math.min(1, (maxGen - i) / 6)})`;
                    ctx.lineWidth = 1 / scale;
                    ctx.strokeRect(qx, qy, size, size);

                    // Beschriftung (Fibonacci-Zahl)
                    let currentDisplaySize = size * scale;
                    if (currentDisplaySize > 20 && currentDisplaySize < window.innerWidth * 1.5) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                        let fontSize = Math.max(11 / scale, size * 0.12);
                        ctx.font = `${fontSize}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(size, qx + size / 2, qy + size / 2);
                    }

                    // Spirale zeichnen
                    ctx.beginPath();
                    ctx.strokeStyle = '#00e5ff';
                    ctx.lineWidth = 2 / scale;
                    
                    if (dir === 0) ctx.arc(qx, qy + size, size, 1.5 * Math.PI, 0);
                    else if (dir === 1) ctx.arc(qx, qy, size, 0, 0.5 * Math.PI);
                    else if (dir === 2) ctx.arc(qx + size, qy, size, 0.5 * Math.PI, Math.PI);
                    else if (dir === 3) ctx.arc(qx + size, qy + size, size, Math.PI, 1.5 * Math.PI);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // --- MAUS EVENTS (DESKTOP) ---
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = 1.12;
            const mouseX = e.clientX - window.innerWidth / 2;
            const mouseY = e.clientY - window.innerHeight / 2;

            if (e.deltaY < 0) {
                scale *= zoomFactor;
                offsetX -= (mouseX - offsetX) * (zoomFactor - 1);
                offsetY -= (mouseY - offsetY) * (zoomFactor - 1);
            } else {
                scale /= zoomFactor;
                offsetX += (mouseX - offsetX) * (1 - 1 / zoomFactor);
                offsetY += (mouseY - offsetY) * (1 - 1 / zoomFactor);
            }
            draw();
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            offsetX = e.clientX - startX;
            offsetY = e.clientY - startY;
            draw();
        });

        window.addEventListener('mouseup', () => isDragging = false);

        // --- TOUCH EVENTS FÜR SMARTPHONES (KORRIGIERT) ---
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - offsetX;
                startY = e.touches[0].clientY - offsetY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                touchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                touchStartScale = scale;
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                offsetX = e.touches[0].clientX - startX;
                offsetY = e.touches[0].clientY - startY;
                draw();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - window.innerWidth / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - window.innerHeight / 2;

                const newScale = touchStartScale * (dist / touchStartDist);
                // Sicherheitsgrenzen für extremen Zoom
                if (newScale > 0.01 && newScale < 1e15) {
                    const scaleRatio = newScale / scale;
                    scale = newScale;
                    offsetX -= (midX - offsetX) * (scaleRatio - 1);
                    offsetY -= (midY - offsetY) * (scaleRatio - 1);
                    draw();
                }
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => { isDragging = false; touchStartDist = 0; });
        canvas.addEventListener('touchcancel', () => { isDragging = false; });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
