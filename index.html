<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Perfekter Fibonacci Zoom</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(11, 12, 16, 0.85);
            padding: 12px 16px;
            border-radius: 10px;
            pointer-events: none;
            max-width: 280px;
            border: 1px solid #1f2833;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 4px 0; font-size: 14px; color: #66fcf1; }
        p { margin: 0; font-size: 11px; color: #c5a059; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="info">
        <h1>Exakte Fibonacci-Spirale</h1>
        <p>📱 <b>2 Finger:</b> Zoomen (Zentriert)<br>🖱️ <b>Mausrad:</b> Zoomen (Zentriert)<br>⚠️ <i>Stoppt strikt bei der innersten 1</i></p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Start-Skalierung
        let scale = 30; 
        
        // Touch-Gesten-Tracking Variablen
        let touchStartDist = 0;
        let touchStartScale = 30;

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.resetTransform();
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }

        // Fibonacci-Folge (1, 1, 2, 3, 5, 8, 13, 21, ...)
        function getFib(n) {
            if (n <= 0) return 0;
            if (n === 1) return 1;
            let a = 0, b = 1;
            for (let i = 2; i <= n; i++) {
                let c = a + b;
                a = b;
                b = c;
            }
            return b;
        }

        // Mathematisch exakte Anordnung der Quadrate (im Uhrzeigersinn)
        // Die Quadrate werden spiralförmig angeordnet, wobei jedes neue Quadrat
        // sich um die bisherige Spirale herum anlagert.
        function getSquare(n) {
            if (n === 1) return { x: 0, y: 0, size: 1, dir: 0 };
            if (n === 2) return { x: 0, y: -1, size: 1, dir: 1 };
            if (n === 3) return { x: -2, y: -1, size: 2, dir: 2 };
            if (n === 4) return { x: -2, y: 1, size: 3, dir: 3 };
            if (n === 5) return { x: 1, y: -1, size: 5, dir: 0 };
            if (n === 6) return { x: 1, y: -9, size: 8, dir: 1 };
            if (n === 7) return { x: -12, y: -9, size: 13, dir: 2 };
            if (n === 8) return { x: -12, y: 4, size: 21, dir: 3 };

            // Für n > 8 berechnen wir die Position iterativ
            let x = 0, y = 0;
            
            for (let i = 2; i <= n; i++) {
                let fCurr = getFib(i);
                let fPrev = getFib(i - 1);
                let fPrevPrev = getFib(i - 2);
                let step = (i - 1) % 4;

                if (step === 1) { // Oben anbauen
                    y -= fCurr;
                } else if (step === 2) { // Links anbauen
                    x -= (fCurr + fPrev);
                    y -= (fCurr - fPrev);
                } else if (step === 3) { // Unten anbauen
                    x -= (fCurr - fPrev);
                    y += fPrev;
                } else if (step === 0) { // Rechts anbauen
                    x += fPrev;
                    y -= (fCurr - fPrev);
                }
            }

            return { x: x, y: y, size: getFib(n), dir: (n - 1) % 4 };
        }

        function draw() {
            // Hintergrund mit korrekter Canvas-Größe füllen (FIX für Bug 5)
            ctx.fillStyle = '#0b0c10';
            ctx.fillRect(0, 0, canvas.width / window.devicePixelRatio, canvas.height / window.devicePixelRatio);

            ctx.save();
            // Kamera genau auf die Mitte des Bildschirms setzen
            ctx.translate(window.innerWidth / 2, window.innerHeight / 2);
            ctx.scale(scale, scale);

            // Bestimme, wie viele Quadrate gezeichnet werden müssen basierend auf dem Zoom
            let maxGen = Math.floor(Math.log(scale + 100) * 1.5) + 5;
            if (maxGen < 10) maxGen = 10;

            // Schleife startet strikt bei 1 (Keine Nullen, keine Brüche!)
            for (let i = 1; i <= maxGen; i++) {
                let s = getSquare(i);
                let displaySize = s.size * scale;

                // Nur zeichnen, wenn es im sichtbaren Bereich liegt
                if (displaySize > 0.5 && displaySize < window.innerWidth * 4) {
                    
                    // Quadrate zeichnen
                    ctx.strokeStyle = 'rgba(102, 252, 241, 0.4)';
                    ctx.lineWidth = 1 / scale;
                    ctx.strokeRect(s.x, s.y, s.size, s.size);

                    // Beschriftung der Quadrate (Ganzzahlen)
                    if (displaySize > 20 && displaySize < window.innerWidth * 1.2) {
                        ctx.fillStyle = 'rgba(197, 160, 89, 0.9)';
                        let fontSize = Math.max(10 / scale, s.size * 0.15);
                        ctx.font = `bold ${fontSize}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(s.size, s.x + s.size / 2, s.y + s.size / 2);
                    }

                    // Goldene Spirale (Viertelkreise) zeichnen
                    ctx.beginPath();
                    ctx.strokeStyle = '#45f3ff';
                    ctx.lineWidth = 2 / scale;

                    // Die Richtung bestimmt, wo der Bogen gezeichnet wird
                    if (s.dir === 0) ctx.arc(s.x + s.size, s.y + s.size, s.size, Math.PI, 1.5 * Math.PI);
                    else if (s.dir === 1) ctx.arc(s.x + s.size, s.y, s.size, 0.5 * Math.PI, Math.PI);
                    else if (s.dir === 2) ctx.arc(s.x, s.y, s.size, 0, 0.5 * Math.PI);
                    else if (s.dir === 3) ctx.arc(s.x, s.y + s.size, s.size, 1.5 * Math.PI, 2 * Math.PI);
                    
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // --- MAUS ZOOM (STARR AUF DIE MITTE GERICHTET) ---
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            let newScale = scale * zoomFactor;

            // STRICKTER STOPP: Verhindert, dass man weiter als bis zur innersten 1 herauszoomed
            // Minimale Skalierung: 5 (zeigt noch die ersten Quadrate)
            // Maximale Skalierung: 100000 (für extreme Zoom-Tiefen)
            if (newScale > 5 && newScale < 100000) {
                scale = newScale;
                draw();
            }
        }, { passive: false });

        // --- SMARTPHONE TOUCH ZOOM (KORRIGIERT & FIXIERT) ---
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                // Exakter Abstand zwischen Finger 0 und Finger 1
                touchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                touchStartScale = scale;
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && touchStartDist > 0) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                let newScale = touchStartScale * (dist / touchStartDist);
                
                // Stoppt beim Rauszoomen an der gleichen Grenze wie die Maus
                if (newScale > 5 && newScale < 100000) {
                    scale = newScale;
                    draw();
                }
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => { touchStartDist = 0; });
        canvas.addEventListener('touchcancel', () => { touchStartDist = 0; });

        window.addEventListener('resize', resize);
        resize();
    </script>

</body>
</html>
