<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Perfekte Fibonacci-Spirale</title>
<style>
* { box-sizing: border-box; touch-action: none; margin: 0; padding: 0; }
body, html { width: 100%; height: 100%; overflow: hidden; background: #0b0c10; }
canvas { display: block; width: 100vw; height: 100vh; }
#info {
  position: absolute; top: 12px; left: 12px;
  background: rgba(11,12,16,0.85); padding: 10px 14px;
  border-radius: 10px; pointer-events: none;
  border: 1px solid #1f2833;
}
#info h1 { font-size: 13px; color: #66fcf1; font-family: system-ui; margin-bottom: 3px; }
#info p { font-size: 11px; color: #c5a059; font-family: system-ui; line-height: 1.5; }
</style>
</head>
<body>
<div id="info">
  <h1>Perfekte Fibonacci-Spirale</h1>
  <p>🖱️ Mausrad: Zoomen · 📱 2 Finger: Zoomen</p>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let scale = 30;
let touchStartDist = 0, touchStartScale = 30;

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.resetTransform();
  ctx.scale(devicePixelRatio, devicePixelRatio);
  draw();
}

function fib(n) {
  if (n <= 0) return 0;
  if (n === 1) return 1;
  let a = 0, b = 1;
  for (let i = 2; i <= n; i++) { let c = a+b; a=b; b=c; }
  return b;
}

function getSquares(count) {
  const squares = [];
  let bx = 0, by = 0, bw = 0, bh = 0;

  for (let n = 1; n <= count; n++) {
    const s = fib(n);
    let x, y;
    const dir = (n - 1) % 4;
    if (n === 1) {
      x = 0; y = 0;
      bx = 0; by = 0; bw = 1; bh = 1;
    } else if (n === 2) {
      x = 0; y = -1;
    } else {
      if (dir === 2) {
        x = bx - s; y = by;
      } else if (dir === 3) {
        x = bx; y = by + bh;
      } else if (dir === 0) {
        x = bx + bw; y = by;
      } else {
        x = bx; y = by - s;
      }
    }

    if (n >= 2) {
      bx = Math.min(bx, x);
      by = Math.min(by, y);
      bw = Math.max(bx + bw, x + s) - bx;
      bh = Math.max(by + bh, y + s) - by;
    }

    squares.push({ x, y, size: s, dir });
  }
  return squares;
}

const arcDef = [
  { cx: 0, cy: 1, start: Math.PI * 0.5, end: 0,             ccw: false },
  { cx: 0, cy: 1, start: Math.PI,       end: Math.PI * 0.5, ccw: false },
  { cx: 1, cy: 0, start: Math.PI * 1.5, end: Math.PI,       ccw: false },
  { cx: 1, cy: 0, start: 0,             end: Math.PI * 1.5, ccw: false },
];

function draw() {
  const W = window.innerWidth, H = window.innerHeight;
  ctx.fillStyle = '#0b0c10';
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(scale, scale);

  let maxN = Math.min(Math.floor(Math.log(scale + 10) * 2.5) + 15, 70);
  const squares = getSquares(maxN);

  ctx.strokeStyle = 'rgba(102,252,241,0.2)';
  ctx.lineWidth = 1/scale;
  for (const sq of squares) {
    const ds = sq.size * scale;
    if (ds < 0.05 || ds > W * 20) continue;
    ctx.strokeRect(sq.x, sq.y, sq.size, sq.size);
  }

  for (const sq of squares) {
    const ds = sq.size * scale;
    if (ds < 30 || ds > W * 5) continue;
    ctx.fillStyle = 'rgba(197,160,89,0.85)';
    const fs = Math.max(10/scale, sq.size * 0.15);
    ctx.font = `bold ${fs}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sq.size, sq.x + sq.size/2, sq.y + sq.size/2);
  }

  ctx.strokeStyle = '#45f3ff';
  ctx.lineWidth = 2/scale;
  for (let i = 0; i < squares.length; i++) {
    const sq = squares[i];
    const ds = sq.size * scale;
    if (ds < 0.05 || ds > W * 20) continue;
    const d = arcDef[sq.dir];
    const mx = sq.x + d.cx * sq.size;
    const my = sq.y + d.cy * sq.size;
    ctx.beginPath();
    ctx.arc(mx, my, sq.size, d.start, d.end, d.ccw);
    ctx.stroke();
  }

  ctx.restore();
}

window.addEventListener('wheel', e => {
  e.preventDefault();
  scale *= e.deltaY < 0 ? 1.1 : 1/1.1;
  scale = Math.max(1e-10, Math.min(1e15, scale));
  draw();
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    touchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    touchStartScale = scale;
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && touchStartDist > 0) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    scale = touchStartScale * (d / touchStartDist);
    draw();
  }
}, { passive: true });

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
