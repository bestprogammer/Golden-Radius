<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Echter Unendlicher Zentrums-Zoom</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(11, 12, 16, 0.85);
            padding: 12px 16px;
            border-radius: 10px;
            pointer-events: none;
            max-width: 280px;
            border: 1px solid #1f2833;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 4px 0; font-size: 14px; color: #66fcf1; }
        p { margin: 0; font-size: 11px; color: #c5a059; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="info">
        <h1>Echter Unendlicher Radius</h1>
        <p>📱 <b>2 Finger:</b> Zoomt starr in die Mitte<br>🖱️ <b>Mausrad:</b> Zoomt starr in die Mitte</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Die mathematische Basis des Goldenen Schnitts
        const PHI = (1 + Math.sqrt(5)) / 2;
        
        // Logarithmische Basis für den nahtlosen Zoomwechsel
        const LOG_PHI = Math.log(PHI);

        // Zoom-Faktor (wird über Touch/Maus gesteuert)
        let currentZoom = 0; 

        let touchStartDist = 0;
        let touchStartZoom = 0;

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.resetTransform();
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }

        // Berechnet die exakte Position der Spirale relativ zum unendlichen Fixpunkt
        function getSquareConfig(i) {
            // Skalierung des Quadrats i im goldenen Verhältnis
            let size = Math.pow(PHI, i);
            let dir = ((i % 4) + 4) % 4; // Verhindert negative Modulo-Fehler

            // Mathematische Verschiebungskonstanten, um den unendlichen Fluchtpunkt im Ursprung (0,0) zu halten
            // Diese Werte sind die exakten Grenzwerte der geometrischen Reihe der Spirale
            let cx = 1 / (1 + Math.pow(PHI, 2));
            let cy = PHI / (1 + Math.pow(PHI, 2));

            let x = 0;
            let y = 0;

            // Richtungsausrichtung: 0=Rechts, 1=Unten, 2=Links, 3=Oben
            if (dir === 0) { x = -cx * size; y = -cy * size; }
            else if (dir === 1) { x = (1 - cx) * size; y = -cy * size; }
            else if (dir === 2) { x = (1 - cx) * size; y = (1 - cy) * size; }
            else if (dir === 3) { x = -cx * size; y = (1 - cy) * size; }

            return { x, y, size, dir };
        }

        function draw() {
            ctx.fillStyle = '#0b0c10';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            ctx.save();
            // Zeichne ALLES exakt zentriert in der Mitte des Bildschirms
            ctx.translate(window.innerWidth / 2, window.innerHeight / 2);

            // Modulo-Rechnung für den unendlichen Skalierungseffekt
            let globalScale = Math.pow(PHI, currentZoom);
            let baseStep = Math.floor(currentZoom);
            let fractionalZoom = currentZoom - baseStep;

            // Wir zeichnen von der kleinsten sichtbaren Box im Zentrum nach aussen weg
            let startGeneration = -baseStep - 4; 
            let endGeneration = startGeneration + 25; 

            for (let g = startGeneration; g < endGeneration; g++) {
                let config = getSquareConfig(g);
                
                // Wende die globale Skalierung an
                let x = config.x * globalScale;
                let y = config.y * globalScale;
                let size = config.size * globalScale;
                let dir = config.dir;

                // Nur zeichnen, wenn das Quadrat im sichtbaren Bildschirmbereich liegt
                if (size > 0.2 && size < window.innerWidth * 4) {
                    
                    // Zeichne das Quadrat mit einem sanften Ausfading für sehr grosse Boxen
                    let opacity = Math.min(0.5, (window.innerWidth * 2 - size) / (window.innerWidth * 2));
                    if (opacity < 0) opacity = 0;

                    ctx.strokeStyle = `rgba(102, 252, 241, ${opacity})`;
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(x, y, size, size);

                    // Beschriftung: Berechne den echten Fibonacci-Verhältniswert für die Box
                    // Da wir unendlich tief gehen, nutzen wir die gerundete relative Fibonacci-Ebene
                    if (size > 30 && size < window.innerWidth * 1.2) {
                        ctx.fillStyle = `rgba(197, 160, 89, ${opacity * 1.8})`;
                        let fontSize = Math.min(24, Math.max(10, size * 0.12));
                        ctx.font = `bold ${fontSize}px monospace`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        // Generiert den echten Fibonacci-Wert relativ zur Skalierungsebene
                        let fibValue = Math.round(Math.pow(PHI, g + 13)); 
                        ctx.fillText(fibValue.toLocaleString('de-CH'), x + size / 2, y + size / 2);
                    }

                    // Zeichne den Spiralbogen (Viertelkreis) passend zur Richtung
                    ctx.beginPath();
                    ctx.strokeStyle = '#45f3ff';
                    ctx.lineWidth = 2.5;
                    if (dir === 0) ctx.arc(x, y + size, size, 1.5 * Math.PI, 0);
                    else if (dir === 1) ctx.arc(x, y, size, 0, 0.5 * Math.PI);
                    else if (dir === 2) ctx.arc(x + size, y, size, 0.5 * Math.PI, Math.PI);
                    else if (dir === 3) ctx.arc(x + size, y + size, size, Math.PI, 1.5 * Math.PI);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // --- MAUS ZOOM (STARR AUF DIE MITTE GERENTET) ---
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            // Ändert das Zoomlevel linear im logarithmischen Raum von PHI
            if (e.deltaY < 0) {
                currentZoom += 0.15; // Reinzoomen
            } else {
                currentZoom -= 0.15; // Rauszoomen
            }
            draw();
        }, { passive: false });

        // --- SMARTPHONE TOUCH ZOOM (STARR AUF DIE MITTE GERICHTET) ---
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                touchStartZoom = currentZoom;
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && touchStartDist > 0) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                // Verhältnisberechnung im logarithmischen PHI-Raum für seidenweichen Zoom
                let factor = dist / touchStartDist;
                currentZoom = touchStartZoom + (Math.log(factor) / LOG_PHI);
                
                draw();
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => { touchStartDist = 0; });
        canvas.addEventListener('touchcancel', () => { touchStartDist = 0; });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
