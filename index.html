<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Perfekter Fibonacci Zentrums-Zoom</title>
    <style>
        * { box-sizing: border-box; touch-action: none; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0c10;
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(11, 12, 16, 0.85);
            padding: 12px 16px;
            border-radius: 10px;
            pointer-events: none;
            max-width: 280px;
            border: 1px solid #1f2833;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 4px 0; font-size: 14px; color: #66fcf1; }
        p { margin: 0; font-size: 11px; color: #c5a059; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="info">
        <h1>Exakte Fibonacci-Spirale</h1>
        <p>📱 <b>2 Finger:</b> Starres unendliches Zoomen<br>🖱️ <b>Mausrad:</b> Starres unendliches Zoomen<br>⚠️ <i>Stoppt strikt bei 1 (keine Nullen)</i></p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Goldener Schnitt & Asymptotischer Pol (Fixpunkt) der exakten Fibonacci-Spirale
        const PHI = (1 + Math.sqrt(5)) / 2;
        const POLE_X = 0.27639320225; 
        const POLE_Y = 0.72360679774;

        // Skalierungsfaktor (Zoom)
        let scale = 150; 
        
        // Touch-Gesten-Tracking
        let touchStartDist = 0;
        let touchStartScale = 150;

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.resetTransform();
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }

        // Dynamische Generierung echter Fibonacci-Zahlen (Zahlfolge)
        function getFib(n) {
            if (n <= 0) return 1;
            let a = 1, b = 1;
            for (let i = 3; i <= n; i++) {
                let c = a + b;
                a = b;
                b = c;
            }
            return b;
        }

        // Berechnet die korrekte geometrische Anordnung nach dem Standard-Anbaumuster
        function getSquarePosition(n) {
            let x = 0, y = 0;
            if (n === 1) return { x: 0, y: 0, size: 1, dir: 0 };
            if (n === 2) return { x: 1, y: 0, size: 1, dir: 1 };

            // Startkoordinaten für den iterativen Aufbau ab Box 1
            let currentX = 0, currentY = 0;
            
            for (let i = 3; i <= n; i++) {
                let prevSize = getFib(i - 1);
                let prevPrevSize = getFib(i - 2);
                let currentSize = getFib(i);
                let dir = (i - 1) % 4; // 0: rechts, 1: unten, 2: links, 3: oben

                // Exakte relative Anbautranslationen der Quadrate
                if (dir === 1) { // Unten anbauen
                    currentY += prevPrevSize;
                } else if (dir === 2) { // Links anbauen
                    currentX -= currentSize;
                } else if (dir === 3) { // Oben anbauen
                    currentY -= currentSize;
                    currentX -= (prevSize - currentSize);
                } else if (dir === 0) { // Rechts anbauen
                    currentX += prevSize;
                    currentY -= (prevSize - currentPrevSize);
                }
                
                if (i === n) {
                    return { x: currentX, y: currentY, size: currentSize, dir: dir };
                }
            }
            return { x: 0, y: 0, size: 1, dir: 0 };
        }

        function draw() {
            ctx.fillStyle = '#0b0c10';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            ctx.save();
            // 1. Schiebe den Ursprung in die exakte Mitte des Bildschirms
            ctx.translate(window.innerWidth / 2, window.innerHeight / 2);
            
            // 2. Skaliere die gesamte Szene basierend auf dem Zoom
            ctx.scale(scale, scale);
            
            // 3. Zentriere die Kamera auf den unendlichen Fixpunkt (Pol) der Spirale
            ctx.translate(-POLE_X, -POLE_Y);

            // Bestimme das Sichtbarkeitsfenster der Quadrate anhand des aktuellen Zooms
            let estimatedMaxGen = Math.floor(Math.log(scale) / Math.log(PHI)) + 5;
            let maxGen = Math.max(15, estimatedMaxGen);

            // WICHTIG: Die Schleife startet zwingend bei 1. Es gibt keine Generierung kleinerer Zahlen gegen 0!
            for (let i = 1; i <= maxGen; i++) {
                let rect = getSquarePosition(i);
                let currentDisplaySize = rect.size * scale;

                // Rendere nur Quadrate, die überhaupt ins Display passen
                if (currentDisplaySize > 0.5 && currentDisplaySize < window.innerWidth * 5) {
                    
                    // Zeichne das exakt ausgerichtete Quadrat
                    ctx.strokeStyle = `rgba(102, 252, 241, ${Math.min(0.6, currentDisplaySize / 40)})`;
                    ctx.lineWidth = 1 / scale;
                    ctx.strokeRect(rect.x, rect.y, rect.size, rect.size);

                    // Beschriftung: Zeigt NUR echte Fibonacci-Ganzzahlen an
                    if (currentDisplaySize > 25 && currentDisplaySize < window.innerWidth * 1.2) {
                        ctx.fillStyle = 'rgba(197, 160, 89, 0.9)';
                        let fontSize = Math.max(10 / scale, rect.size * 0.14);
                        ctx.font = `bold ${fontSize}px monospace`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        // Zeichnet die exakte, echte Ganzzahl (1, 1, 2, 3, 5, 8...) ohne Brüche
                        ctx.fillText(rect.size, rect.x + rect.size / 2, rect.y + rect.size / 2);
                    }

                    // Mathematisch exakt anschliessender Bogen (die Spirale)
                    ctx.beginPath();
                    ctx.strokeStyle = '#45f3ff';
                    ctx.lineWidth = 2.5 / scale;
                    
                    if (rect.dir === 0) ctx.arc(rect.x, rect.y + rect.size, rect.size, 1.5 * Math.PI, 0);
                    else if (rect.dir === 1) ctx.arc(rect.x, rect.y, rect.size, 0, 0.5 * Math.PI);
                    else if (rect.dir === 2) ctx.arc(rect.x + rect.size, rect.y, rect.size, 0.5 * Math.PI, Math.PI);
                    else if (rect.dir === 3) ctx.arc(rect.x + rect.size, rect.y + rect.size, rect.size, Math.PI, 1.5 * Math.PI);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // --- MAUS ZOOM (STARR IN DIE MITTE MIT VOLLEM STOPP) ---
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
            
            let newScale = scale * zoomFactor;
            
            // MINIMALER ZOOM-STOPP: Verhindert, dass das erste Quadrat (Grösse 1) kleiner als die Ausgangsgrösse wird
            if (newScale >= 40) {
                scale = newScale;
                draw();
            }
        }, { passive: false });

        // --- SMARTPHONE TOUCH ZOOM (STARR IN DIE MITTE MIT VOLLEM STOPP) ---
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                touchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                touchStartScale = scale;
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && touchStartDist > 0) {
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                let newScale = touchStartScale * (dist / touchStartDist);
                
                // Verhindert das unendliche Herauszoomen ins Negative/Nullbereich
                if (newScale >= 40) {
                    scale = newScale;
                    draw();
                }
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => { touchStartDist = 0; });
        canvas.addEventListener('touchcancel', () => { touchStartDist = 0; });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
